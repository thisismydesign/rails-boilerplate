services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: thisismydesign/rails-boilerplate:local
    command: sleep infinity
    ports:
      - 3000:3000
    depends_on:
      - db
    environment:
      DB_HOST: db
    volumes:
      - bundle_cache:/usr/local/bundle
      - .:/workspaces/rails-boilerplate:cached

  db:
    image: postgres:16.1-alpine
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432

volumes:
  bundle_cache:
